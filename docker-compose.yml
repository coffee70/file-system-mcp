services:
  mcp-code-assistant:
    build: .
    ports:
      - "8003:8000"
    environment:
      WORKSPACE_ROOT: /workspace
      ENABLE_WRITES: ${ENABLE_WRITES:-false}
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - ${HOST_REPO_PATH:-.}:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped